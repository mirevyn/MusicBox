services:

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: music_box
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ./musicbox-backend/musicbox.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build: ./musicbox-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MUSICBOX_MYSQL_DSN: root:${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}@tcp(mysql:3306)/music_box?charset=utf8mb4&parseTime=True&loc=Local
      MUSICBOX_JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      MUSICBOX_HTTP_ADDR: ${MUSICBOX_HTTP_ADDR:-:8000}
      GIN_MODE: ${GIN_MODE:-release}
      MUSICBOX_CORS_ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      MUSICBOX_UPLOAD_SONG_PATH: /app/uploads/music
      MUSICBOX_UPLOAD_COVER_PATH: /app/uploads/covers
      MUSICBOX_UPLOAD_LYRIC_PATH: /app/uploads/lyrics
      MUSICBOX_UPLOAD_AVATAR_PATH: /app/uploads/avatars
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_MODEL: ${AI_MODEL:-}
      AI_PROVIDER: ${AI_PROVIDER:-auto}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_ALLOW_PRIVATE_BASE_URLS: ${AI_ALLOW_PRIVATE_BASE_URLS:-false}
      AI_REQUEST_TIMEOUT_SECONDS: ${AI_REQUEST_TIMEOUT_SECONDS:-300}
    volumes:
      - ./musicbox-backend/uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8000/healthz > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s


  frontend:
    build: ./musicbox-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./musicbox-backend/uploads:/usr/share/nginx/html/uploads:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1/ > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
